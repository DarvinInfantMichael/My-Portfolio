<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Darvin Infant Michael L</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #fd7805;
            --secondary-color: #4d44db;
            --dark-color: #2f2e41;
            --gray-color: #808b96;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #ffffff;
            color: var(--dark-color);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        section {
            padding: 100px 0;
        }
        
        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
            color: var(--dark-color);
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 2px;
        }
        
        .section-subtitle {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 50px;
            color: var(--gray-color);
        }
        
        .contact-content {
            display: flex;
            gap: 50px;
            justify-content: center;
        }
        
        .contact-info {
            flex: 1;
            max-width: 600px;
        }
        
        .contact-info h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--dark-color);
        }
        
        .contact-info p {
            color: var(--gray-color);
            margin-bottom: 30px;
        }
        
        .contact-details {
            margin-bottom: 40px;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .contact-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: var(--primary-color);
            font-size: 1.2rem;
        }
        
        .contact-text h4 {
            font-size: 1.1rem;
            color: var(--dark-color);
            margin-bottom: 5px;
        }
        
        .contact-text p {
            margin: 0;
            color: var(--gray-color);
        }
        
        .contact-social {
            display: flex;
            justify-content: center;
        }
        
        .contact-social a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(255, 90, 2, 0.1);
            border-radius: 50%;
            margin: 0 15px;
            color: var(--primary-color);
            transition: all 0.3s ease;
            font-size: 1.5rem;
        }
        
        .contact-social a:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-5px);
        }
        
        @media (max-width: 768px) {
            .contact-content {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <section id="contact">
        <div class="container">
            <h2 class="section-title">Contact Me</h2>
            <p class="section-subtitle">Get in touch</p>
            <div class="contact-content">
                <div class="contact-info">
                    <h3>Let's Connect</h3>
                    <p>I'm always open to discussing new opportunities, collaborations, or just having a chat about technology and development.</p>
                    <div class="contact-details">
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div class="contact-text">
                                <h4>Email</h4>
                                <p><a href="mailto:your.email@example.com">your.email@example.com</a></p>
                            </div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fab fa-linkedin"></i>
                            </div>
                            <div class="contact-text">
                                <h4>LinkedIn</h4>
                                <p><a href="https://www.linkedin.com/feed/" target="_blank">Darvin Infant Michael</a></p>
                            </div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fab fa-github"></i>
                            </div>
                            <div class="contact-text">
                                <h4>GitHub</h4>
                                <p><a href="https://github.com/DarvinInfantMichael" target="_blank">DarvinInfantMichael</a></p>
                            </div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-phone"></i>
                            </div>
                            <div class="contact-text">
                                <h4>Contact Number</h4>
                                <p>+1 (555) 123-4567</p>
                            </div>
                        </div>
                    </div>
                    <div class="contact-social">
                        <a href="https://www.linkedin.com/feed/" target="_blank"><i class="fab fa-linkedin"></i></a>
                        <a href="https://github.com/DarvinInfantMichael" target="_blank"><i class="fab fa-github"></i></a>
                        <a href="mailto:your.email@example.com"><i class="fas fa-envelope"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
